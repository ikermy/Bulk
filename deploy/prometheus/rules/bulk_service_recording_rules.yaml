groups:
- name: bulk_service_recording
  rules:
  - record: bulk_service:upload_p95:5m
    expr: |
      histogram_quantile(0.95, sum(rate(bulk_service_http_request_duration_seconds_bucket{route="/api/v1/upload"}[5m])) by (le))

  - record: bulk_service:jobs_per_min:1m
    expr: |
      sum(rate(bulk_service_jobs_completed_total[1m])) * 60

  - record: bulk_service:job_success_rate:5m
    expr: |
      (increase(bulk_service_jobs_completed_total[5m]) / (increase(bulk_service_jobs_completed_total[5m]) + increase(bulk_service_jobs_failed_total[5m]) + 1e-9)) * 100

  - record: bulk_service:batch_p95:1h
    expr: |
      histogram_quantile(0.95, sum(rate(bulk_service_batch_processing_duration_seconds_bucket[1h])) by (le))

  - record: bulk_service:availability_30d
    expr: |
      1 - (sum(increase(bulk_service_http_requests_total{status=~"5.."}[30d])) / (sum(increase(bulk_service_http_requests_total[30d])) + 1e-9))

