# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes Secret — bulk-service
# ВНИМАНИЕ: Это шаблон. НЕ коммитьте файл с реальными значениями в git!
#
# Создание в кластере (namespace staging / production):
#
#   kubectl create secret generic bulk-service-secrets \
#     --namespace=<staging|production> \
#     --from-literal=database-url='postgres://user:pass@host:5432/db?sslmode=require' \
#     --from-literal=bff-service-token='<jwt-service-token>' \
#     --from-literal=auth-jwks-url='https://your-idp/.well-known/jwks.json' \
#     --from-literal=kafka-brokers='broker1:9092,broker2:9092' \
#     --from-literal=redis-url='redis://:password@redis-host:6379/0' \
#     --from-literal=storage-endpoint='minio.example.com' \
#     --from-literal=storage-access-key='<access-key>' \
#     --from-literal=storage-secret-key='<secret-key>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Обновление одного ключа:
#   kubectl patch secret bulk-service-secrets \
#     -n <namespace> \
#     --type merge \
#     -p '{"stringData":{"bff-service-token":"<new-token>"}}'
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: bulk-service-secrets
  labels:
    app: bulk-service
type: Opaque
stringData:
  # PostgreSQL DSN (обязательно)
  database-url: "postgres://CHANGEME:CHANGEME@postgres:5432/bulk_service?sslmode=require"

  # JWT для вызовов внутренних /internal/* эндпоинтов BFF
  bff-service-token: "CHANGEME"

  # URL публичных JWKS-ключей вашего Identity Provider
  auth-jwks-url: "https://your-idp.example.com/.well-known/jwks.json"

  # Kafka brokers (запятая-разделённый список)
  kafka-brokers: "kafka:9092"

  # Redis URL (redis://[:password@]host:port/db)
  redis-url: "redis://redis:6379/0"

  # MinIO / S3 объектное хранилище (опционально)
  storage-endpoint: "minio:9000"
  storage-access-key: "CHANGEME"
  storage-secret-key: "CHANGEME"

