apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-slack
  namespace: monitoring
type: Opaque
stringData:
  # Set via: kubectl create secret generic alertmanager-slack \
  #   --from-literal=slack_api_url='https://hooks.slack.com/services/...' \
  #   --namespace=monitoring
  slack_api_url: "REPLACE_WITH_YOUR_SLACK_WEBHOOK_URL"

