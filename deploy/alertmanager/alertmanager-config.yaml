global:
  resolve_timeout: 5m
  # slack_api_url should be provided via secret in production

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - # NOTE: do NOT commit your real webhook to git. Create a Kubernetes Secret and mount
        # it into the Alertmanager pod at /etc/alertmanager/secrets/slack_api_url and
        # then replace the api_url below with a file reference in your deployment.
        api_url: 'REPLACE_WITH_SECRET:/etc/alertmanager/secrets/slack_api_url'
        channel: '#alerts'
        text: "[{{ .CommonLabels.severity }}] {{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}"

inhibit_rules: []

