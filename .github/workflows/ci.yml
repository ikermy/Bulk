name: Bulk Service CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Check forbidden direct HTTP calls
        run: |
          echo "Checking for direct HTTP client usage outside internal/billing..."
          BAD=$(grep -R --line-number -E "http\.Post|client\.Do" --exclude-dir=.git || true)
          if [ -n "$BAD" ]; then
            FILTERED=$(echo "$BAD" | grep -v "internal/billing" || true)
            if [ -n "$FILTERED" ]; then
              echo "Forbidden direct HTTP client usage found outside internal/billing:"
              echo "$FILTERED"
              exit 1
            fi
          fi
          echo "No forbidden direct HTTP client usage outside internal/billing."
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run tests
        run: |
          echo "Checking formatting..."
          gofmt -l . | tee /tmp/gofmt_out || true
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found issues"; exit 1
          fi

          echo "Running go vet..."
          go vet ./...

          echo "Installing staticcheck..."
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "Running staticcheck..."
          staticcheck ./...

          echo "Running forbidden-http test..."
          go test ./internal/ci -v

          echo "Running unit tests with coverage..."
          go test -v -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 70%"
            exit 1
          fi
          echo "Coverage check passed: $COVERAGE%"
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Run Testcontainers-based Kafka integration test (if Docker available)
        env:
          RUN_TESTCONTAINERS: 1
        run: |
          echo "Attempting Testcontainers Kafka integration test..."
          go test -tags=integration ./internal/kafka -run TestKafka_WithTestcontainers -v || echo "Testcontainers test failed or not supported, continuing to docker-compose fallback"
      - name: Start postgres for integration tests
        run: |
          docker compose -f deploy/docker-compose.int.yml up -d postgres
          for i in {1..30}; do
            docker exec $(docker ps -q -f ancestor=postgres:15) pg_isready -U test && break || sleep 1
          done
      - name: Install migrate and apply DB migrations
        run: |
          echo "Installing golang-migrate"
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.15.2/migrate.linux-amd64.tar.gz | tar xz
          ./migrate -version || true
          echo "Waiting for postgres..."
          CONTAINER=$(docker ps -q -f ancestor=postgres:15)
          for i in {1..30}; do docker exec "$CONTAINER" pg_isready -U test && break || sleep 1; done
          echo "Applying migrations via migrate"
          export POSTGRES_TEST_DSN="postgres://test:test@localhost:5433/bulk_service_test?sslmode=disable"
          ./migrate -path migrations -database "$POSTGRES_TEST_DSN" up || true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run integration tests
        env:
          RUN_INT_TESTS: 1
          POSTGRES_TEST_DSN: "postgres://test:test@localhost:5433/bulk_service_test?sslmode=disable"
        run: |
          docker compose -f deploy/docker-compose.int.yml up -d kafka
          for i in {1..30}; do nc -z localhost 9092 && break || sleep 1; done
          go test -tags=integration ./internal/kafka -v || true
          go test ./internal/adapters/postgres -v
      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.int.yml down -v

  e2e:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Cache Kafka image
        uses: actions/cache@v4
        with:
          path: .github/docker-cache/kafka-image.tar
          key: kafka-image-${{ runner.os }}-v1
      - name: Ensure Kafka image available (load from cache or pull)
        run: |
          mkdir -p .github/docker-cache
          if [ -f .github/docker-cache/kafka-image.tar ]; then
            echo "Loading Kafka image from cache"
            docker load -i .github/docker-cache/kafka-image.tar
          else
            IMAGE=apache/kafka:3.7.0
            echo "Pulling $IMAGE"
            docker pull $IMAGE
            docker save $IMAGE -o .github/docker-cache/kafka-image.tar
          fi
      - name: Start integration services
        run: |
          docker compose -f deploy/docker-compose.int.yml up -d postgres kafka
          for i in {1..30}; do docker exec $(docker ps -q -f ancestor=postgres:15) pg_isready -U test && break || sleep 1; done
      - name: Run E2E tests
        env:
          RUN_INT_TESTS: 1
        run: |
          go test -tags=integration ./... -v
      - name: Tear down E2E services
        if: always()
        run: docker compose -f deploy/docker-compose.int.yml down -v

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ikermy/bulk-service
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl (staging)
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.K8S_KUBECONFIG_STAGING }}
      - name: Deploy to staging
        run: |
          kubectl set image deployment/bulk-service \
            bulk-service=ghcr.io/ikermy/bulk-service:sha-${{ github.sha }} \
            -n staging
          kubectl rollout status deployment/bulk-service -n staging --timeout=120s

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl (production)
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.K8S_KUBECONFIG_PROD }}
      - name: Deploy to production
        run: |
          kubectl set image deployment/bulk-service \
            bulk-service=ghcr.io/ikermy/bulk-service:sha-${{ github.sha }} \
            -n production
          kubectl rollout status deployment/bulk-service -n production --timeout=180s
