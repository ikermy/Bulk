              $ref: '#/components/schemas/TopupBonusConfig'
      responses:
        '200':
          description: Updated topup bonus config; повтор с тем же `X-Idempotency-Key` возвращает cached response с `code=DUPLICATE_REQUEST`
          content:
            application/json:
              examples:
                success:
                  value:
                    enabled: true
                    tiers:
                      - minAmount: 10
                        maxAmount: 49.99
                        bonusPercent: 5
                duplicateRequest:
                  value:
                    code: DUPLICATE_REQUEST
                    enabled: true
                    tiers:
                      - minAmount: 10
                        maxAmount: 49.99
                        bonusPercent: 5
              schema:
                $ref: '#/components/schemas/TopupBonusConfig'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/RequestInFlightError'

  /api/v1/admin/config/bulk-limits:
