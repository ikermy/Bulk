          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KafkaTopicsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/v1/admin/users/{userId}/batches:
    get:
      tags: [Admin]
      summary: Список батчей для указанного пользователя (админ)
      security:
        - adminToken: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: perPage
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: status
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Batches for user
          content:
            application/json:
              examples:
                sample:
                  summary: Пример ответа с одним батчем
                  value:
                    batches:
                      - id: batch-123
                        userId: user-456
                        status: processing
                        totalJobs: 100
                        completedJobs: 45
                        failedJobs: 2
                        createdAt: '2026-01-08T10:00:00Z'
                    pagination:
                      page: 1
                      perPage: 20
                      total: 1
              schema:
                $ref: '#/components/schemas/UserBatchesResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /internal/validate:
    post:
      tags: [Internal]
      summary: Валидация строки bulk-задачи
      security:
        - serviceToken: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              userId: user-1
              batchId: batch-77
              buildId: build-20260318-001
              rowNumber: 4
              revision: US_CA_08292017
              fields:
                firstName: JOHN
                lastName: DOE
                dateOfBirth: 1990-05-15
            schema:
              $ref: '#/components/schemas/InternalValidateRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              examples:
                valid:
                  value:
                    valid: true
                invalid:
                  value:
                    valid: false
                    errors:
                      - revision is required
                      - fields must not be empty
              schema:
                $ref: '#/components/schemas/InternalValidateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /internal/billing/quote:
    post:
      tags: [Internal]
      summary: Внутренняя котировка для Bulk Service
      security:
        - serviceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalQuoteRequest'
      responses:
        '200':
          description: Quote response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '402':
          $ref: '#/components/responses/InsufficientFundsError'
        '503':
          $ref: '#/components/responses/ServiceError'

  /internal/billing/block-batch:
    post:
      tags: [Internal]
      summary: Блокировка батча для Bulk Service
      security:
        - serviceToken: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            example:
              userId: user-1
              count: 10
              batchId: batch-77
            schema:
              $ref: '#/components/schemas/BlockBatchRequest'
      responses:
        '200':
          description: Transaction IDs; повтор с тем же `X-Idempotency-Key` возвращает cached response с `code=DUPLICATE_REQUEST`
          content:
            application/json:
              examples:
                success:
                  value:
                    transactionIds:
                      - batch-77-tx-1
                      - batch-77-tx-2
                      - batch-77-tx-3
                duplicateRequest:
                  value:
                    code: DUPLICATE_REQUEST
                    transactionIds:
                      - batch-77-tx-1
                      - batch-77-tx-2
                      - batch-77-tx-3
              schema:
                $ref: '#/components/schemas/BlockBatchResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/RequestInFlightError'
        '503':
          $ref: '#/components/responses/ServiceError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    serviceToken:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: true
      schema:
        type: string
      description: Обязателен для write-операций, когда `ENABLE_IDEMPOTENCY=true`; повторный запрос с тем же ключом возвращает cached response (`HTTP 200`, `code=DUPLICATE_REQUEST`).

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InsufficientFundsError:
      description: Insufficient funds or free edit already used
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceError:
      description: Downstream service error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleErrorResponse'
    ForbiddenError:
      description: Invalid admin or service token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleErrorResponse'
    RequestInFlightError:
      description: A request with the same idempotency key is already being processed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SimpleErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
          description: Присутствует, например, в maintenance mode.

    ErrorResponse:
      type: object
      required: [code, message]
      example:
        code: VALIDATION_ERROR
        message: "required input fields missing: [lastName]"
        details:
          missingFields:
            - lastName
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - MISSING_DEPENDENCY
            - INSUFFICIENT_FUNDS
            - PARTIAL_FUNDS
            - DUPLICATE_REQUEST
            - BARCODEGEN_ERROR
            - BILLING_ERROR
            - REQUEST_IN_FLIGHT
            - PARTIAL_AVAILABLE
            - SERVICE_ERROR
            - BATCH_NOT_FOUND
            - BATCH_ALREADY_PROCESSED
            - BATCH_CANCELLED
            - NOT_FOUND
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    PartialFundsResponse:
      type: object
      required: [code, message, partial, confirmed]
      example:
        code: PARTIAL_FUNDS
        message: only 3 of 5 units available, set confirmed=true to proceed
        partial: true
        confirmed: false
      properties:
        code:
          type: string
          enum: [PARTIAL_FUNDS]
        message:
          type: string
        partial:
          type: boolean
          example: true
        confirmed:
          type: boolean
          example: false

    RevisionListResponse:
      type: object
      required: [revisions]
      properties:
        revisions:
          type: array
          items:
            $ref: '#/components/schemas/RevisionSummary'

    RevisionSummary:
      type: object
      required: [name, displayName, enabled]
      properties:
        name:
          type: string
        displayName:
          type: string
        enabled:
          type: boolean

    QuoteResponse:
      type: object
      required: [canProcess, partial, requested, allowedTotal, unitPrice, bySource]
      example:
        canProcess: true
        partial: false
        requested: 5
        allowedTotal: 5
        unitPrice: 0.5
        bySource:
          subscription:
            units: 3
            remaining: 27
          credits:
            units: 2
            remaining: 18
          wallet:
            units: 0
            amount: 0
      properties:
        canProcess:
          type: boolean
        partial:
          type: boolean
        requested:
          type: integer
        allowedTotal:
          type: integer
        unitPrice:
          type: number
          format: double
        bySource:
          $ref: '#/components/schemas/QuoteBreakdown'
        shortfall:
          $ref: '#/components/schemas/Shortfall'

    QuoteBreakdown:
      type: object
      required: [subscription, credits, wallet]
      properties:
        subscription:
          $ref: '#/components/schemas/SourceBreakdown'
        credits:
          $ref: '#/components/schemas/SourceBreakdown'
        wallet:
          $ref: '#/components/schemas/SourceBreakdown'

    SourceBreakdown:
      type: object
      properties:
        units:
          type: integer
        remaining:
          type: integer
        amount:
          type: number
          format: double

    Shortfall:
      type: object
      required: [units, amountRequired]
      properties:
        units:
          type: integer
        amountRequired:
          type: number
          format: double

    GenerateRequest:
      type: object
      required: [revision, barcodeType, units]
      example:
        revision: US_CA_08292017
        barcodeType: pdf417
        units: 2
        confirmed: true
        buildId: build-20260318-001
        batchId: batch-42
        fields:
          firstName: JOHN
          lastName: DOE
          dateOfBirth: 1990-05-15
          street: 123 Main St
          city: Los Angeles
          state: CA
          zipCode: '90001'
      properties:
        revision:
          type: string
        barcodeType:
          type: string
          enum: [pdf417, code128]
        units:
          type: integer
          minimum: 1
        confirmed:
          type: boolean
          description: Если не передан, трактуется как false.
        buildId:
          type: string
        batchId:
          type: string
        fields:
          type: object
          additionalProperties: true
        generateSignature:
          type: boolean
        signatureStyle:
          type: string
        generatePhoto:
          type: boolean
        photoDescription:
          type: string
        gender:
          type: string
        age:
          type: integer

    GenerateResponse:
      type: object
      required: [success, barcodes, computed, skipped, billing]
      example:
        success: true
        buildId: build-20260318-001
        batchId: batch-42
        barcodes:
          - url: https://cdn.example.com/barcodes/pdf417_1.png
            format: pdf417
        computed:
          - DAQ
          - DAK
          - DAE
          - DBB
        skipped: []
        billing:
          totalCost: 0.5
          bySource:
            subscription:
              units: 1
              remaining: 29
            credits:
              units: 0
              remaining: 20
            wallet:
              units: 0
              amount: 0
          referralEligible: 0
      properties:
        success:
          type: boolean
        buildId:
          type: string
        batchId:
          type: string
        barcodes:
          type: array
          items:
            $ref: '#/components/schemas/BarcodeItem'
        computed:
          type: array
          items:
            type: string
        skipped:
          type: array
          items:
            type: string
        billing:
          $ref: '#/components/schemas/GenerateBillingResult'

    BarcodeItem:
      type: object
      required: [url, format]
      properties:
        url:
          type: string
        format:
          type: string

    GenerateBillingResult:
      type: object
      required: [totalCost, bySource]
      properties:
        totalCost:
          type: number
          format: double
        bySource:
          $ref: '#/components/schemas/QuoteBreakdown'
        referralEligible:
          type: number
          format: double
        referral:
          $ref: '#/components/schemas/Referral'

    Referral:
      type: object
      required: [eligible, eligibleAmount]
      properties:
        eligible:
          type: boolean
        eligibleAmount:
          type: number
          format: double
        referrerId:
          type: string

    BarcodeOptions:
      type: object
      properties:
        width:
          type: integer
        height:
          type: integer
        errorCorrection:
          type: string
        includeText:
          type: boolean

    GeneratePDF417Request:
      type: object
      required: [fields]
      properties:
        revision:
          type: string
        buildId:
          type: string
        batchId:
          type: string
        fields:
          type: object
          additionalProperties: true
        options:
          $ref: '#/components/schemas/BarcodeOptions'

    GeneratePDF417Response:
      type: object
      required: [success, barcodeUrl, format, metadata]
      properties:
        success:
          type: boolean
        barcodeUrl:
          type: string
        format:
          type: string
        metadata:
          $ref: '#/components/schemas/BarcodeMetadata'

    GenerateCode128Request:
      type: object
      required: [data]
      properties:
        data:
          type: string
        buildId:
          type: string
        options:
          $ref: '#/components/schemas/BarcodeOptions'

    GenerateCode128Response:
      type: object
      required: [success, barcodeUrl, format, metadata]
      properties:
        success:
          type: boolean
        barcodeUrl:
