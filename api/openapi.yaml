                $ref: '#/components/schemas/BulkLimitsConfig'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    put:
      tags: [Admin]
      summary: Обновить конфиг лимитов для bulk
      security:
        - adminToken: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkLimitsConfig'
      responses:
        '200':
          description: Updated bulk limits config; повтор с тем же `X-Idempotency-Key` возвращает cached response с `code=DUPLICATE_REQUEST`
          content:
            application/json:
              examples:
                success:
                  value:
