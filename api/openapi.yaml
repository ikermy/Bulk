openapi: 3.0.3
info:
  title: Barcode BFF API
  version: 1.0.0
  description: |
    Актуальная OpenAPI-спецификация для HTTP API BFF.

    BFF выступает оркестратором и не содержит доменной логики расчётов.
    Все non-system endpoints могут дополнительно вернуть 503 при включённом
    maintenance mode.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
tags:
  - name: System
  - name: Billing
  - name: Revisions
  - name: Barcode
  - name: Bulk
  - name: Admin
  - name: Internal
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /ready:
    get:
      tags: [System]
      summary: Readiness check — готовность принимать трафик (DB/Kafka checks)
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ready
        '503':
          description: Not ready (dependencies missing or unhealthy)
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: unready
                  details:
                    type: object
                    additionalProperties: true

  /metrics:
    get:
      tags: [System]
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string

  /api/v1/billing/quote:
    get:
      tags: [Billing]
      summary: Проверка доступных средств
      parameters:
        - in: query
          name: units
          required: true
          schema:
            type: integer
            minimum: 1
        - in: query
          name: revision
          required: false
          schema:
            type: string
          description: Если не указан, BFF использует ревизию по умолчанию `US_CA_08292017`.
      responses:
        '200':
          description: Quote response
          content:
            application/json:
              examples:
                full:
                  summary: Полный quote без shortfall
                  value:
                    canProcess: true
                    partial: false
                    requested: 5
                    allowedTotal: 5
                    unitPrice: 0.5
                    bySource:
                      subscription:
                        units: 3
                        remaining: 27
                      credits:
                        units: 2
                        remaining: 18
                      wallet:
                        units: 0
                        amount: 0
                partial:
                  summary: Частичный quote со shortfall (billing разрешил 60 из 120)
                  value:
                    canProcess: true
                    partial: true
                    requested: 120
                    allowedTotal: 60
                    unitPrice: 0.5
                    bySource:
                      subscription:
                        units: 30
                        remaining: 0
                      credits:
                        units: 20
                        remaining: 0
                      wallet:
                        units: 10
                        amount: 5
                    shortfall:
                      units: 60
                      amountRequired: 30
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '402':
          $ref: '#/components/responses/InsufficientFundsError'
        '503':
          $ref: '#/components/responses/ServiceError'

  /api/v1/revisions:
    get:
      tags: [Revisions]
      summary: Список доступных ревизий
      responses:
        '200':
          description: Enabled revisions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/v1/revisions/{revision}/schema:
    get:
      tags: [Revisions]
      summary: Схема формы для ревизии
      parameters:
        - in: path
          name: revision
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Revision schema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionSchema'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/v1/barcode/generate:
    post:
      tags: [Barcode]
      summary: Генерация баркодов
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            example:
              revision: US_CA_08292017
              barcodeType: pdf417
              units: 2
              confirmed: true
              buildId: build-20260318-001
              batchId: batch-42
              fields:
                firstName: JOHN
                lastName: DOE
                dateOfBirth: 1990-05-15
                street: 123 Main St
                city: Los Angeles
                state: CA
                zipCode: '90001'
              generateSignature: true
              signatureStyle: cursive
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Успешная генерация или partial funds ответ
          content:
            application/json:
              examples:
                success:
                  summary: Успешная генерация
                  value:
                    success: true
                    buildId: build-20260318-001
                    batchId: batch-42
                    barcodes:
                      - url: https://cdn.example.com/barcodes/pdf417_1.png
                        format: pdf417
                      - url: https://cdn.example.com/barcodes/pdf417_2.png
                        format: pdf417
                    computed:
                      - DAQ
                      - DAK
                      - DAE
                      - DBB
                    skipped: []
                    billing:
                      totalCost: 1
                      bySource:
                        subscription:
                          units: 1
                          remaining: 29
                        credits:
                          units: 1
                          remaining: 19
                        wallet:
                          units: 0
                          amount: 0
                      referralEligible: 0
                partialFunds:
                  summary: Partial funds, требуется подтверждение
                  value:
                    code: PARTIAL_FUNDS
                    message: only 3 of 5 units available, set confirmed=true to proceed
                    partial: true
                    confirmed: false
                duplicateRequest:
                  summary: Повторный запрос с тем же X-Idempotency-Key
                  value:
                    code: DUPLICATE_REQUEST
                    success: true
                    buildId: build-20260318-001
                    batchId: batch-42
                    barcodes:
                      - url: https://cdn.example.com/barcodes/pdf417_1.png
                        format: pdf417
                    computed:
                      - DAQ
                      - DAK
                      - DAE
                      - DBB
                    skipped: []
                    billing:
                      totalCost: 0.5
                      bySource:
                        subscription:
                          units: 1
                          remaining: 29
                        credits:
                          units: 0
                          remaining: 20
                        wallet:
                          units: 0
                          amount: 0
                      referralEligible: 0
              schema:
                oneOf:
                  - $ref: '#/components/schemas/GenerateResponse'
                  - $ref: '#/components/schemas/PartialFundsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '402':
          $ref: '#/components/responses/InsufficientFundsError'
        '409':
          $ref: '#/components/responses/RequestInFlightError'
        '503':
          $ref: '#/components/responses/ServiceError'

  /api/v1/barcode/generate/pdf417:
    post:
      tags: [Barcode]
      summary: Dedicated генерация PDF417
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePDF417Request'
      responses:
        '200':
          description: PDF417 generated; повтор с тем же `X-Idempotency-Key` возвращает cached response с `code=DUPLICATE_REQUEST`
          content:
            application/json:
              examples:
                success:
                  value:
                    success: true
                    barcodeUrl: https://cdn.example.com/barcodes/pdf417_1.png
                    format: pdf417
                    metadata:
                      width: 420
                      height: 160
                      dataLength: 128
                duplicateRequest:
                  value:
                    code: DUPLICATE_REQUEST
                    success: true
                    barcodeUrl: https://cdn.example.com/barcodes/pdf417_1.png
                    format: pdf417
                    metadata:
                      width: 420
                      height: 160
                      dataLength: 128
              schema:
                $ref: '#/components/schemas/GeneratePDF417Response'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/RequestInFlightError'
        '503':
          $ref: '#/components/responses/ServiceError'

  /api/v1/barcode/generate/code128:
    post:
      tags: [Barcode]
      summary: Dedicated генерация Code128
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateCode128Request'
      responses:
        '200':
          description: Code128 generated; повтор с тем же `X-Idempotency-Key` возвращает cached response с `code=DUPLICATE_REQUEST`
          content:
            application/json:
              examples:
                success:
                  value:
                    success: true
                    barcodeUrl: https://cdn.example.com/barcodes/code128_1.png
                    format: code128
                    metadata:
                      width: 320
                      height: 110
                      encodedData: ABC-123
                duplicateRequest:
                  value:
                    code: DUPLICATE_REQUEST
                    success: true
                    barcodeUrl: https://cdn.example.com/barcodes/code128_1.png
                    format: code128
                    metadata:
                      width: 320
                      height: 110
                      encodedData: ABC-123
              schema:
                $ref: '#/components/schemas/GenerateCode128Response'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/RequestInFlightError'
        '503':
          $ref: '#/components/responses/ServiceError'

  /api/v1/barcode/{id}:
    get:
      tags: [Barcode]
      summary: Получить существующий баркод для remake
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Barcode record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarcodeRecord'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ServiceError'

  /api/v1/barcode/{id}/edit:
    post:
      tags: [Barcode]
      summary: Бесплатное редактирование одного поля
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            example:
              field: lastName
              value: SMITH
            schema:
              $ref: '#/components/schemas/EditRequest'
      responses:
        '200':
          description: Edit result; повтор с тем же `X-Idempotency-Key` возвращает cached response с `code=DUPLICATE_REQUEST`
          content:
            application/json:
              examples:
                success:
                  value:
                    newUrl: https://cdn.example.com/barcodes/pdf417_edited.png
                    canEdit: true
                duplicateRequest:
                  value:
                    code: DUPLICATE_REQUEST
                    newUrl: https://cdn.example.com/barcodes/pdf417_edited.png
                    canEdit: true
              schema:
                $ref: '#/components/schemas/EditResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '402':
          $ref: '#/components/responses/InsufficientFundsError'
        '409':
          $ref: '#/components/responses/RequestInFlightError'
        '503':
          $ref: '#/components/responses/ServiceError'

  /api/v1/bulk/wake:
    post:
      tags: [Bulk]
      summary: Проверка активности bulk consumer
      security:
        - serviceToken: []
      responses:
        '200':
          description: Consumer status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkWakeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/v1/upload:
    post:
      tags: [Bulk]
      summary: Загрузка XLS-файла для массовой генерации (ТЗ §3.1)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: XLS-файл с данными для генерации
                revision:
                  type: string
                  description: Ревизия шаблона (по умолчанию US_CA_08292017)
      responses:
        '200':
          description: Файл принят, batch создан и готов к подтверждению
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
              example:
                success: true
                batchId: batch-123
                status: ready
                summary:
                  totalRows: 100
                  validRows: 95
                  invalidRows: 5
                billing:
                  canProcess: true
                  requested: 95
                  allowedTotal: 95
                nextStep: confirm
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '402':
          description: Недостаточно средств — частичная обработка (PARTIAL_AVAILABLE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: PARTIAL_AVAILABLE
                message: "Insufficient funds. Generate 60 of 100?"
                details:
                  batchId: batch-123
                  billing:
                    canProcess: true
                    requested: 100
                    allowedTotal: 60
                  options:
                    generatePartial:
                      count: 60
                    cancel:
                      message: Cancel batch and top up balance
        '503':
          $ref: '#/components/responses/ServiceError'
  /api/v1/batches:
    get:
      tags: [Bulk]
      summary: Список батчей текущего пользователя (ТЗ §3.6)
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, ready, processing, completed, cancelled, failed]
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 начало диапазона
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
          description: RFC3339 конец диапазона
        - in: query
          name: revision
          required: false
          schema:
            type: string
        - in: query
          name: sortBy
          required: false
          schema:
            type: string
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Список батчей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchListResponse'
              example:
                data:
                  - batchId: batch-123
                    status: completed
                    totalJobs: 100
                    completedJobs: 98
                    failedJobs: 2
                    createdAt: '2026-01-08T10:00:00Z'
                    completedAt: '2026-01-08T10:15:00Z'
                meta:
                  page: 1
                  limit: 20
                  total: 1
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/batch/{batchId}:
    get:
      tags: [Bulk]
      summary: Статус и прогресс батча (ТЗ §3.4)
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Состояние батча
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/RequestInFlightError'
  /api/v1/batch/{batchId}/status:
    get:
      tags: [Bulk]
      summary: Алиас GET /api/v1/batch/{batchId} — статус батча (ТЗ §3.4)
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Состояние батча
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/RequestInFlightError'
  /api/v1/batch/{batchId}/confirm:
    post:
      tags: [Bulk]
      summary: Подтверждение генерации батча (ТЗ §3.3)
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmRequest'
            example:
              action: generate_all
      responses:
        '202':
          description: Батч принят в обработку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmResponse'
              example:
                success: true
                batchId: batch-123
                status: processing
                jobsQueued: 95
                estimatedTimeSeconds: 285
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '402':
          $ref: '#/components/responses/InsufficientFundsError'
  /api/v1/batch/{batchId}/cancel:
    post:
      tags: [Bulk]
      summary: Отмена батча (ТЗ §3.5)
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Батч отменён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResponse'
              example:
                success: true
                batchId: batch-123
                status: cancelled
                refund:
                  pending: 50
                  refunded: 50
                  transactionIds:
                    - tx-1
                    - tx-2
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ServiceError'
  /api/v1/batch/{batchId}/export:
    post:
      tags: [Bulk]
      summary: Запустить асинхронный экспорт результатов батча
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Экспорт поставлен в очередь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportStartResponse'
              example:
                id: batch-123
                status: queued
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/export/{id}:
    get:
      tags: [Bulk]
      summary: Получить статус/ссылку на готовый экспорт
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: download
          required: false
          schema:
            type: boolean
          description: Если true — проксирует файл вместо presigned URL
      responses:
        '200':
          description: Статус экспорта, presigned URL или бинарный файл
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportGetResponse'
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/batch/{batchId}/errors.xlsx:
    get:
      tags: [Bulk]
      summary: Скачать файл ошибок валидации (ТЗ §3.7)
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: XLSX-файл с ошибками валидации
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/batch/{batchId}/results.xlsx:
    get:
      tags: [Bulk]
      summary: Скачать результаты батча в XLSX (ТЗ §3.8)
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: XLSX-файл с результатами (buildId, barcodeUrls)
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/template/{revision}:
    get:
      tags: [Bulk]
      summary: Скачать XLS-шаблон для ревизии (ТЗ §5.4)
      security: []
      parameters:
        - in: path
          name: revision
          required: true
          schema:
            type: string
          description: Идентификатор ревизии, например US_CA_08292017
      responses:
        '200':
          description: XLS-шаблон
          content:
            application/vnd.ms-excel:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/admin/batches:
    get:
      tags: [Admin]
      summary: Список всех батчей (ТЗ §10.5.1)
      security:
        - adminToken: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: perPage
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - in: query
          name: status
          required: false
          schema:
            type: string
        - in: query
          name: userId
          required: false
          schema:
            type: string
        - in: query
          name: revision
          required: false
          schema:
            type: string
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Список батчей с пагинацией
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBatchListResponse'
              example:
                batches:
                  - id: batch-123
                    userId: user-456
                    status: processing
                    totalJobs: 100
                    completedJobs: 45
                    failedJobs: 2
                    createdAt: '2026-01-08T10:00:00Z'
                pagination:
                  page: 1
                  perPage: 20
                  total: 150
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/admin/batches/{batchId}:
    get:
      tags: [Admin]
      summary: Детали батча (ТЗ §10.5.3)
      security:
        - adminToken: []
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Детальная информация по батчу включая jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBatchDetailResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/admin/batches/{batchId}/config:
    put:
      tags: [Admin]
      summary: Обновить конфигурацию батча (ТЗ §10.5.5)
      security:
        - adminToken: []
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateBatchConfigRequest'
