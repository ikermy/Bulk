          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /admin/revisions:
    get:
      tags: [Admin]
      summary: Список конфигов ревизий
      security:
        - adminToken: []
      responses:
        '200':
          description: Revision configs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRevisionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /admin/revisions/{revision}:
    put:
      tags: [Admin]
      summary: Обновить конфиг ревизии
      security:
        - adminToken: []
      parameters:
        - in: path
          name: revision
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRevisionRequest'
      responses:
        '200':
          description: Updated revision config request payload; повтор с тем же `X-Idempotency-Key` возвращает cached response с `code=DUPLICATE_REQUEST`
          content:
