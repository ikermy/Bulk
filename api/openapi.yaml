          description: Updated timeouts; повтор с тем же `X-Idempotency-Key` возвращает cached response с `code=DUPLICATE_REQUEST`
          content:
            application/json:
              examples:
                success:
                  value:
                    barcodeGen: 30000
                    billing: 5000
                    ai: 60000
                    history: 5000
                    auth: 5000
                duplicateRequest:
                  value:
                    code: DUPLICATE_REQUEST
                    barcodeGen: 30000
                    billing: 5000
                    ai: 60000
                    history: 5000
                    auth: 5000
              schema:
                $ref: '#/components/schemas/ServiceTimeouts'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/RequestInFlightError'

  /admin/config/topup-bonus:
    put:
